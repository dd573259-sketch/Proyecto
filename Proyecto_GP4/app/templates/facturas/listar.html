{% extends 'main.html' %}
{% load static %}
{% block Contenido %}
  <div class="tabla-wrapper">
    <table class="tabla" id="tabla">
      <thead>
        <tr>
          <th>id</th>
          <th>Venta</th>
          <th>Total</th>
          <th>Método de Pago</th>
          <th>Fecha</th>
          <th>Eliminar</th>
        </tr>
      </thead>
      <tbody>
        {% for f in facturas %}
          <tr>
            <td>{{ f.id }}</td>
            <td>Venta #{{ f.venta.id_venta }}</td>
            <td>${{ f.valor_total }}</td>
            <td>{{ f.metodo_pago }}</td>
            <td>{{ f.fecha_hora }}</td>

            <td>
              <a href="{% url 'app:eliminar_factura' f.id %}" class="btn btn-danger btn-xs"><i class="fas fa-trash"></i></a>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
{% endblock %}
