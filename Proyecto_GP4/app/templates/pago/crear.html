{% extends "main.html" %}

{% block Contenido %}

<div class="card shadow-sm">
    <div class="card-header bg-success text-white">
        <h3 class="card-title" style="margin:0;">
            <i class="fas fa-cash-register"></i> Registrar Pago
        </h3>
    </div>

    <div class="card-body">

        <!-- INFO DE LA VENTA -->
        <div class="alert alert-info">
            <div class="row">
                <div class="col-md-6">
                    <i class="fas fa-shopping-cart"></i>
                    <strong>Venta:</strong> {{ venta.codigo }}
                </div>
                <div class="col-md-6">
                    <i class="fas fa-dollar-sign"></i>
                    <strong>Total a pagar:</strong> $<span id="total-venta">{{ venta.total }}</span>
                </div>
            </div>
        </div>

        <form method="POST" id="form-pago">
            {% csrf_token %}

            <!-- METODO DE PAGO -->
            <div class="form-group">
                <label for="metodo_pago"><strong>Método de pago:</strong></label>
                <select id="metodo_pago" name="metodo_pago" class="form-control" required>
                    <option value="">— Seleccione un método —</option>
                    <option value="Efectivo">$ Efectivo</option>
                    <option value="Tarjeta">  $$ Tarjeta</option>
                    <option value="Transferencia"> $$$ Transferencia</option>
                </select>
            </div>

            <!-- SELECION DE EFECTIVO PARA PAGAR -->
            <div id="seccion-efectivo" style="display:none; margin-top:15px;">
                <div class="form-group">
                    <label for="monto_recibido"><strong>¿Con cuanto paga el cliente?</strong></label>
                    <input 
                        type="number" 
                        id="monto_recibido" 
                        name="monto_recibido"
                        class="form-control" 
                        placeholder="Ingrese el monto recibido"
                        min="{{ venta.total }}"
                        step="100"
                    >
                </div>
                <div id="resultado-vueltas" style="display:none; margin-top:10px;">
                    <div class="alert" id="alerta-vueltas">
                        <strong> $ Vueltas a entregar:</strong>
                        <span id="valor-vueltas" style="font-size:1.2em; font-weight:bold;"></span>
                    </div>
                </div>
                <div id="alerta-insuficiente" style="display:none; margin-top:10px;">
                    <div class="alert alert-danger">
                        <i class="fas fa-exclamation-triangle"></i>
                        <strong>El monto ingresado es menor al total a pagar.</strong>
                    </div>
                </div>
            </div>

            <!-- SELECCION DE  TARJETA -->
            <div id="seccion-tarjeta" style="display:none; margin-top:15px;">
                <div class="alert alert-warning">
                    <i class="fas fa-credit-card"></i>
                    <strong>Datos de la Tarjeta</strong>
                </div>
                <div class="form-group">
                    <label><strong>Tipo de Tarjeta:</strong></label>
                    <div class="d-flex gap-3" style="gap:15px;">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="tipo_tarjeta" id="debito" value="debito">
                            <label class="form-check-label" for="debito">
                                # debito
                            </label>
                        </div>
                        <div class="form-check form-check-inline" style="margin-left:20px;">
                            <input class="form-check-input" type="radio" name="tipo_tarjeta" id="credito" value="Credito">
                            <label class="form-check-label" for="credito">
                                # Credito
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SELECCION DE TRANSFERENCIA -->
            <div id="seccion-transferencia" style="display:none; margin-top:15px;">
                <div class="alert alert-warning">
                    <i class="fas fa-university"></i>
                    <strong>Datos de la Transferencia</strong>
                </div>
                <div class="form-group">
                    <label><strong>Plataforma de transferencia:</strong></label>
                    <div class="d-flex" style="gap:15px; flex-wrap:wrap;">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="plataforma_transferencia" id="nequi" value="Nequi">
                            <label class="form-check-label" for="nequi">
                                 Nequi
                            </label>
                        </div>
                        <div class="form-check form-check-inline" style="margin-left:20px;">
                            <input class="form-check-input" type="radio" name="plataforma_transferencia" id="bancolombia" value="Bancolombia">
                            <label class="form-check-label" for="bancolombia">
                                 Bancolombia
                            </label>
                        </div>
                        <div class="form-check form-check-inline" style="margin-left:20px;">
                            <input class="form-check-input" type="radio" name="plataforma_transferencia" id="daviplata" value="Daviplata">
                            <label class="form-check-label" for="daviplata">
                                 Daviplata
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card-footer text-right" style="margin-top:20px; padding:0;">
                <button type="submit" class="btn btn-success btn-xs" id="btn-registrar">
                    <i class="fas fa-save"></i> Registrar Pago
                </button>
                <a href="{% url 'app:listar_ventas' %}" class="btn btn-danger btn-xs">
                    <i class="fas fa-times"></i> Cancelar
                </a>
            </div>

        </form>
    </div>
</div>

<script>
    const total = parseFloat({{ venta.total }});
    const selectMetodo = document.getElementById('metodo_pago');
    const seccionEfectivo = document.getElementById('seccion-efectivo');
    const seccionTarjeta = document.getElementById('seccion-tarjeta');
    const seccionTransferencia = document.getElementById('seccion-transferencia');
    const montoRecibido = document.getElementById('monto_recibido');
    const resultadoVueltas = document.getElementById('resultado-vueltas');
    const valorVueltas = document.getElementById('valor-vueltas');
    const alertaVueltas = document.getElementById('alerta-vueltas');
    const alertaInsuficiente = document.getElementById('alerta-insuficiente');
    const btnRegistrar = document.getElementById('btn-registrar');

    // Mostrar sección según método elegido
    selectMetodo.addEventListener('change', function() {
        // Ocultar todas las secciones
        seccionEfectivo.style.display = 'none';
        seccionTarjeta.style.display = 'none';
        seccionTransferencia.style.display = 'none';
        montoRecibido.required = false;
        resultadoVueltas.style.display = 'none';
        alertaInsuficiente.style.display = 'none';
        btnRegistrar.disabled = false;

        if (this.value === 'Efectivo') {
            seccionEfectivo.style.display = 'block';
            montoRecibido.required = true;
        } else if (this.value === 'Tarjeta') {
            seccionTarjeta.style.display = 'block';
        } else if (this.value === 'Transferencia') {
            seccionTransferencia.style.display = 'block';
        }
    });

    // Calcular vueltas en tiempo real
    montoRecibido.addEventListener('input', function() {
        const recibido = parseFloat(this.value);

        if (isNaN(recibido) || this.value === '') {
            resultadoVueltas.style.display = 'none';
            alertaInsuficiente.style.display = 'none';
            btnRegistrar.disabled = false;
            return;
        }

        const vueltas = recibido - total;

        if (vueltas < 0) {
            resultadoVueltas.style.display = 'none';
            alertaInsuficiente.style.display = 'block';
            btnRegistrar.disabled = true;
        } else if (vueltas === 0) {
            alertaInsuficiente.style.display = 'none';
            resultadoVueltas.style.display = 'block';
            alertaVueltas.className = 'alert alert-success';
            valorVueltas.textContent = '$0 — Pago exacto ✅';
            btnRegistrar.disabled = false;
        } else {
            alertaInsuficiente.style.display = 'none';
            resultadoVueltas.style.display = 'block';
            alertaVueltas.className = 'alert alert-info';
            valorVueltas.textContent = '$' + vueltas.toLocaleString('es-CO');
            btnRegistrar.disabled = false;
        }
    });

    // Alertas messages
    {% if messages %}
        {% for message in messages %}
        Swal.fire({
            icon: '{% if message.tags == "success" %}success{% elif message.tags == "error" %}error{% elif message.tags == "warning" %}warning{% else %}info{% endif %}',
            title: '{% if message.tags == "success" %}✅ Éxito{% elif message.tags == "error" %}❌ Error{% elif message.tags == "warning" %}⚠️ Advertencia{% else %}ℹ️ Info{% endif %}',
            text: '{{ message }}',
            confirmButtonColor: '{% if message.tags == "success" %}#43a047{% else %}#e53935{% endif %}',
            confirmButtonText: 'Aceptar',
            timer: 4000,
            timerProgressBar: true
        });
        {% endfor %}
    {% endif %}
</script>

{% endblock %}
