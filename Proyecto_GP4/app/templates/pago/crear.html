{% extends "main.html" %}

{% block Contenido %}

<div class="card">

    <div class="card-header">
        <h3>Registrar Pago</h3>
    </div>

    <div class="card-body">

        <p><strong>Venta:</strong> {{ venta.id_venta }}</p>

        <p><strong>Total a pagar:</strong> ${{ venta.total }}</p>

        <form method="POST">
            {% csrf_token %}

            <button type="submit" class="btn btn-success">
                Registrar Pago
            </button>

        </form>

    </div>

</div>

{% endblock %}
