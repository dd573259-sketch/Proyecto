{% extends "index.html" %}
{% load static %}
{% block body %}

<body>

  {% include 'header.html' %}

  {% include 'nav.html' %}
  {% block main %}
  {% endblock main %}
  {%include 'footer.html'%}
  <script src="{% static 'lib/sweetalert2/sweetalert2.all.min.js' %}"></script>

  <script src="{% static 'lib/jquery/jquery-3.6.0.min.js' %}"></script>
  <script src="{% static 'lib/bootstrap-4.4.1-dist/js/bootstrap.min.js' %}"></script>
  <script src="{% static 'lib/adminlte-3.0.4/js/adminlte.min.js' %}"></script>
  <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    {% if messages %}
  <script>
    {% for message in messages %}
      Swal.fire({
        icon: '{% if message.tags == "success" %}success{% elif message.tags == "error" %}error{% elif message.tags == "warning" %}warning{% else %}info{% endif %}',
        title: '{% if message.tags == "success" %}✅ Éxito{% elif message.tags == "error" %} Error{% elif message.tags == "warning" %}⚠️ Advertencia{% else %}ℹ️ Info{% endif %}',
        text: '{{ message }}',
        confirmButtonColor: '{% if message.tags == "success" %}#43a047{% else %}#e53935{% endif %}',
        confirmButtonText: 'Aceptar',
        timer: 3000,
        timerProgressBar: true
      });
    {% endfor %}
  </script>
  {% endif %}
{% block js %}
{% endblock %}

</body>

{% endblock %}
