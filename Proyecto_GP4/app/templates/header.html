{% load static %}

<header>
    <a href="#"><img id="logo" src="{% static 'imagenes/logo.png' %}" alt="Logo"></a>

    <div class="header-right">

        <form action="{% url 'app:listar_notificaciones' %}">
            <button type="submit" class="btn btn-link position-relative">

                <img class="icono" src="{% static 'imagenes/campana.png' %}" alt="Notificaciones">

                {% if contador_notificaciones >= 0 %}
                <span style="
                    position:absolute;
                    top:-5px;
                    right:-5px;
                    background:red;
                    color:white;
                    border-radius:50%;
                    padding:2px 6px;
                    font-size:12px;">
                    {{ contador_notificaciones }}
                </span>
                {% endif %}

            </button>
        </form>

        <form method="post" action="{% url 'login:logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-link">
                <img class="icono" src="{% static 'imagenes/cerrar-sesion.png' %}" alt="Cerrar sesión">
            </button>
        </form>

    </div>

    
</header>
