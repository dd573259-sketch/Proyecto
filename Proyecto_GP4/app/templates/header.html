{% load static %}

<header>
    <a href="#"><img id="logo" src="{% static 'imagenes/logo.png' %}" alt="Logo"></a>
    <div class="header-right">
        <form action="{% url 'app:listar_notificaciones' %}">
            <button type="submit" class="btn btn-link"><img class="icono" src="{% static 'imagenes/campana.png' %}" alt="Notificaciones"></button>
        </form>
        <form method="post" action="{% url 'login:logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-link"><img class="icono" src="{% static 'imagenes/cerrar-sesion.png' %}" alt="Cerrar sesión"></button>   
        </form>
    </div>
</header>
