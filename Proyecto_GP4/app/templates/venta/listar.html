{% extends "main.html" %}
{% load static %}

{% block Contenido %}

<div class="tabla-wrapper">
  <table class="tabla" id="tabla">
    <thead>
      <tr>
        <th>#</th>
        <th>Usuario</th>
        <th>Pedido</th>
        <th>Total</th>
        <th>Fecha</th>
        <th>Eliminar</th>
        <th>Pagar</th>
      </tr>
    </thead>

    <tbody>
      {% for v in ventas %}
      <tr>

        <td>{{ v.id_venta }}</td>

        <td>{{ v.usuario }}</td>

        <td>
          Pedido #{{ v.pedido.id_pedido }}
        </td>

        <td>
          ${{ v.total }}
        </td>

        <td>
          {{ v.fecha_venta }}
        </td>


        <td>
          <a href="{% url 'app:eliminar_venta' v.pk %}" class="btn btn-danger btn-xs">
            <i class="fas fa-trash"></i>
          </a>
        </td>

        <td>
          <a href="{% url 'app:crear_pago' v.id_venta %}" class="btn btn-success btn-xs">
            <i class="fas fa-dollar-sign"></i> Pagar
          </a>
        </td>

      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>


<div class="card-footer">
  <a href="{% url 'app:crear_venta' %}" class="btn btn-primary btn-xs">
    <i class="fas fa-plus"></i> Crear Venta
  </a>
</div>

{% endblock %}
